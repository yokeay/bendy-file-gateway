name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - cf
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'platforms/cloudflare/**'
      - 'web/**'
      - '.github/workflows/deploy-cf.yml'
  workflow_dispatch:

env:
  TINYGO_VERSION: '0.34.0'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            web/package-lock.json
            platforms/cloudflare/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install TinyGo
        run: |
          curl -sSL "https://github.com/tinygo-org/tinygo/releases/download/v${TINYGO_VERSION}/tinygo_${TINYGO_VERSION}_amd64.deb" -o /tmp/tinygo.deb
          sudo dpkg -i /tmp/tinygo.deb
          tinygo version

      - name: Build Go WASM
        run: |
          chmod +x scripts/build-wasm.sh
          ./scripts/build-wasm.sh

      - name: Build Web Frontend
        run: |
          cd web
          npm ci
          npm run build

      - name: Copy web assets to Cloudflare static
        run: |
          mkdir -p platforms/cloudflare/static
          cp -r web/dist/* platforms/cloudflare/static/

      - name: Install Wrangler
        run: |
          cd platforms/cloudflare
          npm ci

      - name: Verify WASM binary
        run: |
          ls -lh platforms/cloudflare/wasm/gateway.wasm
          echo "WASM build successful"

      - name: Deploy to Cloudflare Workers
        run: |
          cd platforms/cloudflare
          npx wrangler deploy --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
